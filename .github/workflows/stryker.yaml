# Stryker mutation testing
#
# Mutation testing is canonical for every repo created from this template.
# The workflow runs Stryker.NET against every test project under tests/ on
# a Windows runner so it can compile every TFM the repo targets - including
# .NET Framework 4.6.2-4.8.1, which a Linux runner cannot build.
#
# Triggers:
# - workflow_dispatch: manual ad-hoc runs (e.g. while iterating on tests)
# - schedule (weekly Sunday 06:00 UTC): catch quality regressions between
#   releases without burning CI time on every PR (mutation testing is slow)
# - pull_request (src/** or tests/** changes): the #124 enforcement gate. The
#   per-project stryker-config.json pins target-framework:net10.0, so a PR runs
#   a single-TFM mutation pass (~minutes) rather than the full matrix, and the
#   config's `break` threshold fails the PR if the score regresses below floor.
# - push to main: re-measure and publish the score to the gh-pages trend.
#
# Stryker discovers each test project's mutation targets via the standard
# project-reference graph. Two configuration modes are supported:
# - Root stryker-config.json (umbrella): if present, runs Stryker once with
#   the umbrella config and skips per-project runs (avoids duplicate work).
# - Per-project stryker-config.json (or none): if no root config exists, runs
#   Stryker once per test project; per-project configs override Stryker's
#   defaults when present.
name: Stryker (mutation testing)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 0' # weekly Sunday 06:00 UTC
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/stryker.yaml'
      - 'scripts/stryker-score.py'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'

permissions:
  contents: read

jobs:
  stryker:
    name: Run Stryker
    # Windows runner so Stryker can compile every TFM the repo targets,
    # including .NET Framework 4.6.2-4.8.1. Linux runners cannot build
    # net4x, so they would silently mutate only the non-Framework TFMs
    # and miss bugs that only reproduce on Framework.
    runs-on: windows-latest
    # Skip on the template repo itself - it has no test projects, so the
    # workflow would just no-op every Sunday at 06:00 UTC, wasting a
    # Windows runner allocation. Matches the same-pattern guard used by
    # the .NET test-stage jobs in pr.yaml.
    if: github.repository != 'Chris-Wolfgang/repo-template'
    timeout-minutes: 120
    steps:
      - name: Check out repo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Setup .NET
        # Install every SDK in the canonical test matrix (.NET Core 3.1
        # through .NET 10.0). Stryker has to be able to build whichever
        # TFM each test project targets; pinning to a subset would
        # silently fail repos that target older runtimes.
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6
        with:
          dotnet-version: |
            3.1.x
            5.0.x
            6.0.x
            7.0.x
            8.0.x
            9.0.x
            10.0.x

      - name: Install dotnet-stryker
        shell: pwsh
        run: |
          dotnet tool update -g dotnet-stryker
          if ($LASTEXITCODE -ne 0) {
            dotnet tool install -g dotnet-stryker
          }

      - name: Run Stryker
        shell: pwsh
        run: |
          # Configuration mode resolution:
          #   1. If a root stryker-config.json exists, it is the umbrella -
          #      run Stryker once with it and stop (per-project runs would
          #      duplicate the same work the umbrella already covers).
          #   2. Otherwise, run Stryker against every test project under
          #      tests/. A per-project stryker-config.json next to a test
          #      project overrides Stryker's defaults when present.

          $failed = 0

          if (Test-Path 'stryker-config.json') {
            Write-Host "::group::Stryker with root umbrella stryker-config.json"
            dotnet stryker --config-file stryker-config.json
            if ($LASTEXITCODE -ne 0) { $failed++ }
            Write-Host "::endgroup::"
          }
          else {
            $tests = @(Get-ChildItem -Path tests -Recurse -Filter '*Test*.csproj' -ErrorAction SilentlyContinue)

            if ($tests.Count -eq 0) {
              Write-Host "::notice::No test projects found under tests/ - skipping Stryker run."
              exit 0
            }

            Write-Host "Found $($tests.Count) test project(s):"
            $tests | ForEach-Object { Write-Host "  $($_.FullName)" }
            Write-Host ""

            # Opt-in gating (#124): only run test projects that ship a
            # stryker-config.json. A project without one has no documented
            # score floor yet, so running it with Stryker defaults would be an
            # ungated, all-TFM pass that is slow on every PR and can't fail the
            # gate meaningfully. Add a stryker-config.json next to a test
            # project to bring it under the gate.
            $ran = 0
            foreach ($proj in $tests) {
              $dir = $proj.DirectoryName
              if (-not (Test-Path (Join-Path $dir 'stryker-config.json'))) {
                Write-Host "::notice::No stryker-config.json in $dir - skipping (add one to enable the mutation gate for this project)."
                continue
              }
              $ran++
              Write-Host "::group::Stryker in $dir"
              Push-Location $dir
              try {
                dotnet stryker
                if ($LASTEXITCODE -ne 0) { $failed++ }
              } finally {
                Pop-Location
              }
              Write-Host "::endgroup::"
            }

            if ($ran -eq 0) {
              Write-Host "::notice::No test project has a stryker-config.json - nothing to gate."
              exit 0
            }
          }

          if ($failed -gt 0) {
            Write-Host "::error::$failed Stryker run(s) failed"
            exit 1
          }

      - name: Upload Stryker report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: stryker-report-${{ github.run_id }}
          path: |
            **/StrykerOutput/**
          if-no-files-found: ignore
          retention-days: 30

  # Publish the mutation score to the gh-pages trend (#124), charted by the same
  # benchmark-action pattern the BDN benchmark trend uses. Separate job so only
  # it carries `contents: write`; the gate job above stays least-privilege. Runs
  # only on trusted, non-PR events (a fork PR must never push to gh-pages) and
  # only when the gate above passed (needs: stryker).
  publish-trend:
    name: Publish mutation-score trend
    needs: stryker
    if: github.event_name == 'push' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push the score history to the gh-pages branch
    steps:
      - name: Check out repo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.x'

      - name: Download Stryker report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: stryker-report-${{ github.run_id }}
          path: stryker-report

      - name: Extract mutation score
        run: python scripts/stryker-score.py stryker-report stryker-score.json

      - name: Publish score to gh-pages trend
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1.22.1
        with:
          name: Mutation score
          tool: 'customBiggerIsBetter'
          output-file-path: stryker-score.json
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/stryker
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          # Bigger-is-better: alert if the score drops. Report-only (the PR gate
          # above is the hard enforcement); this line just annotates the trend.
          alert-threshold: '100%'
          comment-on-alert: false
          fail-on-alert: false
